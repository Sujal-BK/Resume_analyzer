services:
  - type: web
    name: resume-analyzer-backend
    runtime: python
    buildCommand: pip install uv && cd Backend && uv sync
    startCommand: cd Backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10
      - key: GROQ_API_KEY
        sync: false
